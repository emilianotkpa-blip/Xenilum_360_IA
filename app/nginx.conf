server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compresión
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
  gzip_min_length 1024;

  # Service worker: nunca cachear y permitir controlar todo el sitio
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Service-Worker-Allowed "/";
    default_type application/javascript;
  }

  # Manifest PWA con su mime correcto (.webmanifest no está en el mime.types por defecto)
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    default_type application/manifest+json;
  }

  # Assets con hash en el nombre (Vite) → cache larga inmutable
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA: cualquier ruta desconocida sirve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
